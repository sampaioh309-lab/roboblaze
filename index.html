<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family: Arial;
    background:#f3f4f6;
    padding:10px;
}

#app{
    max-width:420px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:16px;
    border:1px solid #ccc;
}

h2{text-align:center;margin-bottom:10px}

.botao{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:14px;
    background:linear-gradient(45deg,#06b6d4,#22c55e);
    color:#000;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

img,canvas{
    width:100%;
    margin-top:10px;
    border-radius:12px;
}

#status,#porcentagem{
    text-align:center;
    margin-top:8px;
}

#lista{
    white-space:pre-line;
    margin-top:10px;
    border:1px solid #ccc;
    padding:10px;
    border-radius:12px;
}
</style>

</head>

<body>

<div id="app">

<h2>📸 Robô Double PRO</h2>

<label for="fileInput" class="botao">🖼️ Escolher imagem</label>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<img id="preview">
<canvas id="canvas"></canvas>

<p id="status">Aguardando imagem...</p>
<p id="porcentagem"></p>

<div id="lista"></div>

<div class="botao" onclick="copiarLista()">📋 Copiar Lista</div>
<div class="botao" onclick="ativarSinais()">🚀 Ativar Sinais</div>
<div class="botao" onclick="abrirBlaze()" style="background:#facc15">🌐 Abrir Blaze</div>

</div>

<script>

// 📋 GERAR LISTA
function gerarLista(p,v){

    p = parseFloat(p);
    v = parseFloat(v);

    let d=new Date();
    let h=d.getHours();
    let m=d.getMinutes();

    let lista="";

    for(let i=0;i<10;i++){

        m++;
        if(m>=60){m=0;h++;}

        let cor;

        if(v > p){
            cor = "🔴";
        }else if(p > v){
            cor = "⚫";
        }else{
            cor = Math.random() < 0.5 ? "🔴" : "⚫";
        }

        lista += `${h}:${m.toString().padStart(2,'0')} → ${cor} + ⚪️\n`;
    }

    document.getElementById("lista").innerText = lista;
}

// 🧠 PROCESSAR IMAGEM (OCR POR CAIXA)
function processarImagem(file){

    const reader = new FileReader();

    reader.onload = function(e){

        const preview = document.getElementById("preview");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const status = document.getElementById("status");
        const porcentagem = document.getElementById("porcentagem");

        preview.src = e.target.result;

        let img = new Image();

        img.onload = async function(){

            status.innerText = "🔄 Lendo porcentagens...";

            // 🎯 AJUSTADO PRO SEU PRINT
            let y = img.height * 0.32;
            let h = img.height * 0.10;

            let caixas = [
                {x: img.width * 0.10, w: img.width * 0.25}, // preto
                {x: img.width * 0.38, w: img.width * 0.25}, // vermelho
                {x: img.width * 0.70, w: img.width * 0.20}  // branco
            ];

            let resultados = [];

            for(let i=0;i<3;i++){

                canvas.width = caixas[i].w;
                canvas.height = h;

                ctx.drawImage(
                    img,
                    caixas[i].x, y, caixas[i].w, h,
                    0, 0, canvas.width, canvas.height
                );

                // 🔥 BINARIZAÇÃO
                let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
                let data = imgData.data;

                for(let j=0;j<data.length;j+=4){

                    let media = (data[j]+data[j+1]+data[j+2])/3;
                    let cor = media > 150 ? 255 : 0;

                    data[j]=cor;
                    data[j+1]=cor;
                    data[j+2]=cor;
                }

                ctx.putImageData(imgData,0,0);

                let {data:{text}} = await Tesseract.recognize(canvas,'eng');

                console.log("OCR caixa", i, text);

                let num = text.match(/\d+(\.\d+)?/);

                resultados.push(num ? num[0] : "0");
            }

            let preto = resultados[0];
            let vermelho = resultados[1];
            let branco = resultados[2];

            porcentagem.innerText =
            `⚫ ${preto}% | 🔴 ${vermelho}% | ⚪ ${branco}%`;

            gerarLista(preto, vermelho);

            status.innerText = "✅ Detecção perfeita";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

// 📂 EVENTO
document.getElementById("fileInput").onchange = e=>{
    if(e.target.files[0]) processarImagem(e.target.files[0]);
};

// 📋 COPIAR
function copiarLista(){
    let texto = document.getElementById("lista").innerText;

    if(!texto){
        alert("⚠️ Nenhuma lista gerada");
        return;
    }

    navigator.clipboard.writeText(texto).then(()=>{
        alert("✅ Lista copiada!");
    });
}

// 🚀 ATIVAR SINAIS (fallback)
function ativarSinais(){

    let status = document.getElementById("status");

    let p = Math.floor(Math.random()*50)+30;
    let v = Math.floor(Math.random()*50)+30;
    let b = 100 - (p+v);

    document.getElementById("porcentagem").innerText =
    `⚫ ${p}% | 🔴 ${v}% | ⚪ ${b}%`;

    gerarLista(p,v);

    status.innerText = "🚀 Sinais gerados";
}

// 🌐 ABRIR BLAZE
function abrirBlaze(){
    window.open("https://blaze.com", "_blank");
}

</script>

</body>
</html>
