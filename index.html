<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SHARKBOT AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:#0f0f0f;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px #00ffff33;
}

h1{
font-size:48px;
color:#00ffff;
margin-bottom:10px;
}

#assinatura{
color:#00ffffaa;
margin-bottom:25px;
}

button{
padding:15px 25px;
font-size:18px;
background:#00ffff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:20px;
}

#preview-container{
position:relative;
display:inline-block;
margin-top:20px;
}

#preview{
max-width:600px;
width:100%;
border-radius:10px;
border:2px solid #00ffff55;
}

#scanner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

#scanbar{
position:absolute;
width:100%;
height:6px;
background:#00ffff;
box-shadow:0 0 20px #00ffff;
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{top:0%}
50%{top:100%}
100%{top:0%}
}

#barra{
width:100%;
height:12px;
background:#111;
border-radius:10px;
margin-top:20px;
overflow:hidden;
display:none;
}

#progresso{
height:100%;
width:0%;
background:#00ffff;
}

#resultado{
margin-top:25px;
font-size:22px;
line-height:35px;
}

#recomendacao{
margin-top:20px;
font-size:18px;
text-align:left;
display:inline-block;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>SHARKBOT AI</h1>
<div id="assinatura">Developed by Henrique Sampaio</div>

<input type="file" id="upload">

<div id="preview-container">

<img id="preview">

<div id="scanner">
<div id="scanbar"></div>
</div>

</div>

<div id="barra">
<div id="progresso"></div>
</div>

<br>

<button id="analisarBtn">ANALISAR HISTÓRICO</button>

<div id="resultado"></div>

<div id="recomendacao">

<b>RECOMENDAÇÕES</b>

<br><br>

• Entrar até G1  
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)  
• NÃO entrar após sair branco ⚪

</div>

<br>

<button id="copiarBtn">COPIAR LISTA</button>

</div>

<script>

let imagemCarregada=null
let textoCopiar=""

// MATRIX

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letras="SHARKBOT01"
const array=letras.split("")
const fontSize=18
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ffff"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=array[Math.floor(Math.random()*array.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,35)


// CARREGAR PRINT

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(event){

document.getElementById("preview").src=event.target.result

let img=new Image()
img.src=event.target.result

img.onload=function(){
imagemCarregada=img
}

}

reader.readAsDataURL(file)

})


// ANALISAR

document.getElementById("analisarBtn").onclick=function(){

if(!imagemCarregada){

alert("Envie uma imagem")

return

}

document.getElementById("scanner").style.display="block"
document.getElementById("barra").style.display="block"
document.getElementById("preview").style.filter="brightness(0.4)"

let progresso=0

let barra=setInterval(function(){

progresso++

document.getElementById("progresso").style.width=progresso+"%"

if(progresso>=100){

clearInterval(barra)

processarImagem()

}

},40)

}


function processarImagem(){

let sinais=[]

let agora=new Date()

for(let i=0;i<10;i++){

agora.setMinutes(agora.getMinutes()+3)

let h=agora.getHours().toString().padStart(2,'0')
let m=agora.getMinutes().toString().padStart(2,'0')

let cor=Math.random()>0.5?"🔴":"⚫"

sinais.push(`${h}:${m} ${cor}+⚪`)

}

mostrar(sinais)

}


function mostrar(lista){

document.getElementById("scanner").style.display="none"

document.getElementById("preview").style.filter="brightness(1)"

let div=document.getElementById("resultado")

div.innerHTML=""

textoCopiar=""

lista.forEach(l=>{

div.innerHTML+=l+"<br>"

textoCopiar+=l+"\n"

})

textoCopiar+=`

RECOMENDAÇÕES

• Entrar até G1
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)
• NÃO entrar após sair branco ⚪
`

}


// COPIAR

document.getElementById("copiarBtn").onclick=function(){

navigator.clipboard.writeText(textoCopiar)

alert("Lista copiada com recomendações!")

}

</script>

</body>
</html>
