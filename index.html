<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title><script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script><style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:95%;
    max-width:420px;
    background:#020617;
    border-radius:20px;
    padding:16px;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    border:1px solid #1e293b;
}

h2{
    text-align:center;
    margin-bottom:10px;
    color:#38bdf8;
}

input[type=file]{
    width:100%;
    margin:10px 0;
    padding:8px;
    background:#020617;
    border:1px solid #334155;
    border-radius:10px;
    color:#fff;
}

img,canvas{
    width:100%;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #1e293b;
}

#barra{
    width:100%;
    height:16px;
    background:#020617;
    border:1px solid #334155;
    margin:14px 0;
    border-radius:20px;
    overflow:hidden;
}

#progresso{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00f5ff,#00ff95);
    transition:width 0.3s;
}

#status{
    text-align:center;
    margin-top:6px;
    color:#38bdf8;
}

#porcentagem{
    margin-top:6px;
    font-size:15px;
}

#lista{
    white-space:pre-line;
    margin-top:10px;
    background:#020617;
    border:1px solid #334155;
    border-radius:12px;
    padding:10px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    background:linear-gradient(90deg,#00f5ff,#00ff95);
    color:#020617;
}

#recomendacoes{
    margin-top:14px;
    font-size:13px;
    background:#020617;
    border:1px solid #334155;
    border-radius:12px;
    padding:10px;
    line-height:1.4;
}

footer{
    text-align:center;
    margin-top:12px;
    font-size:11px;
    opacity:0.6;
}
</style></head><body>
<div id="app"><h2>📸 Robô Double PRO</h2><input type="file" id="upload"><img id="preview">
<canvas id="canvas"></canvas><div id="barra"><div id="progresso"></div></div><p id="status">Aguardando imagem...</p>
<p id="porcentagem"></p>
<div id="lista"></div><button onclick="copiarTudo()">📋 Copiar Lista + Recomendações</button>

<div id="recomendacoes">
<b>📋 RECOMENDAÇÕES</b><br><br>
• Entrar até G1<br>
• Evitar sequência de 4 iguais<br>
• NÃO entrar após sair branco ⚪
</div><footer>
Henrique Sampaio<br>Desenvolvedor
</footer></div><script>
function normalizar(v){
    if(v > 100) v = v / 10;
    return v;
}

function gerarCores(preto, vermelho){
    let total = preto + vermelho;
    let proporcaoV = vermelho / total;
    let proporcaoP = preto / total;
    let cores = [];
    let acumuladoV = 0;
    let acumuladoP = 0;

    for(let i=0;i<10;i++){
        acumuladoV += proporcaoV;
        acumuladoP += proporcaoP;
        if(acumuladoV > acumuladoP){
            cores.push("🔴");
            acumuladoV -= 1;
        } else {
            cores.push("⚫");
            acumuladoP -= 1;
        }
    }
    return cores;
}

function gerarLista(preto, vermelho){
    let cores = gerarCores(preto, vermelho);
    cores = cores.map(c => c === "🔴" ? "⚫" : "🔴");

    let agora = new Date();
    let h = agora.getHours();
    let m = agora.getMinutes();
    let lista = "";

    for(let i=0;i<cores.length;i++){
        m += 3;
        if(m >= 60){ m -= 60; h++; }
        let mm = m.toString().padStart(2,'0');
        lista += `${h}:${mm} → ${cores[i]}+⚪️\n`;
    }
    return lista;
}

function carregarBarra(callback){
    let progresso = document.getElementById("progresso");
    let valor = 0;
    let intervalo = setInterval(()=>{
        valor += 5;
        progresso.style.width = valor + "%";
        if(valor >= 100){
            clearInterval(intervalo);
            callback();
        }
    }, 70);
}

function copiarTudo(){
    let lista = document.getElementById("lista").innerText;
    let rec = document.getElementById("recomendacoes").innerText;
    navigator.clipboard.writeText(lista + "\n\n" + rec);
    alert("Copiado!");
}

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);

    let image = new Image();

    image.onload = function(){
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");

        canvas.width = image.width * 2;
        canvas.height = image.height * 2;
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

        let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        let data = imgData.data;

        for(let i=0; i<data.length; i+=4){
            let media = (data[i] + data[i+1] + data[i+2]) / 3;
            let cor = media > 140 ? 255 : 0;
            data[i]=data[i+1]=data[i+2]=cor;
        }

        ctx.putImageData(imgData,0,0);
        document.getElementById("status").innerText = "🔍 Lendo imagem...";

        carregarBarra(()=>{
            Tesseract.recognize(canvas, 'eng').then(({ data: { text } }) => {
                let porcentagens = text.match(/\d+(\.\d+)?(?=\s*%)/g);
                if (!porcentagens || porcentagens.length < 2) {
                    document.getElementById("status").innerText = "❌ Não achou %";
                    return;
                }

                let preto = normalizar(parseFloat(porcentagens[0]));
                let vermelho = normalizar(parseFloat(porcentagens[1]));
                let branco = porcentagens[2] ? normalizar(parseFloat(porcentagens[2])) : 0;

                document.getElementById("porcentagem").innerText =
                    `⚫ ${preto}% | 🔴 ${vermelho}% | ⚪ ${branco}%`;

                let lista = gerarLista(preto, vermelho);
                document.getElementById("status").innerText = "✅ Lista pronta";
                document.getElementById("lista").innerText = lista;
            });
        });
    }

    image.src = URL.createObjectURL(file);
});
</script></body>
</html>
