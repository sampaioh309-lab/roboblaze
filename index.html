<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SHARKBOT AI</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
color:#00ffff;
font-size:48px;
}

#assinatura{
color:#00ffffaa;
margin-bottom:20px;
}

button{
padding:14px 24px;
font-size:18px;
background:#00ffff;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

#previewBox{
position:relative;
display:inline-block;
}

#preview{
max-width:600px;
width:100%;
border-radius:10px;
border:2px solid #00ffff44;
}

#scan{
position:absolute;
left:0;
width:100%;
height:4px;
background:#00ffff;
box-shadow:0 0 20px #00ffff;
animation:scan 2s linear infinite;
display:none;
}

@keyframes scan{
0%{top:0}
50%{top:100%}
100%{top:0}
}

#barra{
width:100%;
height:22px;
background:#111;
border-radius:10px;
margin-top:20px;
overflow:hidden;
display:none;
}

#progresso{
height:100%;
width:0%;
background:#00ffff;
color:black;
font-weight:bold;
line-height:22px;
}

#resultado{
margin-top:30px;
font-size:22px;
line-height:36px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>SHARKBOT AI</h1>
<div id="assinatura">Developed by Henrique Sampaio</div>

<input type="file" id="upload">

<br><br>

<div id="previewBox">
<img id="preview">
<div id="scan"></div>
</div>

<div id="barra">
<div id="progresso">0%</div>
</div>

<br>

<button onclick="analisar()">ANALISAR HISTÓRICO</button>

<div id="resultado"></div>

<br>

<button onclick="copiar()">COPIAR LISTA</button>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const fontSize=14
const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0F0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(drawMatrix,33)

/* BOT */

let imagem=null
let listaCopiar=""

upload.addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(event){

preview.src=event.target.result

let img=new Image()

img.src=event.target.result

img.onload=function(){

imagem=img

}

}

reader.readAsDataURL(file)

})

async function analisar(){

if(!imagem){

alert("Envie um print")

return

}

scan.style.display="block"
barra.style.display="block"

let progressoAtual=0

let barraAnim=setInterval(()=>{

progressoAtual++

progresso.style.width=progressoAtual+"%"
progresso.innerText=progressoAtual+"%"

if(progressoAtual>=100){

clearInterval(barraAnim)

}

},40)

const worker=await Tesseract.createWorker()

await worker.loadLanguage("eng")
await worker.initialize("eng")

const {data}=await worker.recognize(imagem)

await worker.terminate()

scan.style.display="none"

let texto=data.text

let numeros=texto.match(/\d+(\.\d+)?/g)

if(!numeros){

gerarLista(50,50)
return

}

let porcentagens=[]

numeros.forEach(n=>{

let valor=parseFloat(n)

if(valor>=1 && valor<=100){

porcentagens.push(valor)

}

})

if(porcentagens.length<2){

gerarLista(50,50)
return

}

let preto=porcentagens[0]
let vermelho=porcentagens[1]

gerarLista(vermelho,preto)

}

function gerarLista(v,p){

let total=v+p

let qPreto=Math.round((p/total)*10)
let qVermelho=10-qPreto

let cores=[]

for(let i=0;i<qPreto;i++) cores.push("⚫")
for(let i=0;i<qVermelho;i++) cores.push("🔴")

cores.sort(()=>Math.random()-0.5)

let agora=new Date()

let lista=[]

for(let i=0;i<10;i++){

agora.setMinutes(agora.getMinutes()+3)

let h=agora.getHours().toString().padStart(2,"0")
let m=agora.getMinutes().toString().padStart(2,"0")

lista.push(`${h}:${m} ${cores[i]} +⚪`)

}

mostrar(lista)

}

function mostrar(lista){

resultado.innerHTML=""
listaCopiar=""

lista.forEach(l=>{

resultado.innerHTML+=l+"<br>"
listaCopiar+=l+"\n"

})

let rec=`

RECOMENDAÇÕES

• Entrada até G1
• Evitar 4 cores seguidas
• Não entrar após branco ⚪
`

resultado.innerHTML+="<br>"+rec.replace(/\n/g,"<br>")

listaCopiar+=rec

}

function copiar(){

navigator.clipboard.writeText(listaCopiar)

alert("Lista copiada!")

}

</script>

</body>
</html>
