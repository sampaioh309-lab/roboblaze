<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Robô Double PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>

body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #fff;
    text-align: center;
    padding: 20px;
    font-size: 18px;
}

h2 {
    color: #22c55e;
    text-shadow: 0 0 10px #22c55e;
    font-size: 24px;
}

.container {
    max-width: 650px;
    width: 95%;
    margin: auto;
    background: #020617;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

input {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111827;
    color: #fff;
    cursor: pointer;
}

img, canvas {
    width: 100%;
    height: auto;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #1f2937;
}

.card {
    background: #111827;
    padding: 14px;
    margin-top: 10px;
    border-radius: 10px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.status {
    font-weight: bold;
    color: #38bdf8;
}

.resultado {
    font-size: 20px;
    margin-top: 10px;
}

.lista {
    text-align: left;
    white-space: pre-line;
    font-family: monospace;
    margin-top: 10px;
    color: #22c55e;
    font-size: 18px;
}

/* BARRA */
.barra-box {
    width: 100%;
    background: #1f2937;
    border-radius: 10px;
    margin-top: 15px;
    overflow: hidden;
}

.barra {
    height: 24px;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    text-align: center;
    line-height: 24px;
    font-size: 13px;
    position: relative;
    overflow: hidden;
}

.barra::after {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    animation: brilho 2s infinite;
}

@keyframes brilho {
    0% { left: -50%; }
    100% { left: 120%; }
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h2>🤖 Robô Double PRO</h2>

<input type="file" id="upload">

<img id="preview">
<canvas id="canvas"></canvas>

<div class="card status" id="status">Aguardando imagem...</div>

<div class="card resultado" id="texto"></div>

<div class="card resultado" id="porcentagem"></div>

<div class="card lista" id="lista"></div>

<div class="card" id="recomendacoes">
<b>📋 RECOMENDAÇÕES</b><br><br>
• Entrar até G1<br>
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)<br>
• NÃO entrar após sair branco ⚪
</div>

<button id="copiarBtn">📋 Copiar Sinais</button>

<div class="barra-box">
    <div class="barra" id="barra">0%</div>
</div>

<!-- ASSINATURA -->
<div style="
margin-top:15px;
font-size:14px;
color:#94a3b8;
opacity:0.8;
">
Desenvolvido por<br>
<b style="color:#22c55e;">Henrique Sampaio</b><br>
<span style="font-size:12px;">Desenvolvedor</span>
</div>

</div>

<script>

// 🔧 normalizar número
function normalizar(v){
    if(v > 100) v = v / 10;
    return v;
}

// 🎯 gerar cores
function gerarCores(preto, vermelho){
    let total = preto + vermelho;

    let qV = Math.round((vermelho / total) * 10);
    let qP = 10 - qV;

    let cores = [];
    let maior = vermelho >= preto ? "🔴" : "⚫";

    let v=0, p=0;

    while(cores.length < 10){
        if(maior === "🔴"){
            if(v < qV){ cores.push("🔴"); v++; }
            if(p < qP){ cores.push("⚫"); p++; }
        } else {
            if(p < qP){ cores.push("⚫"); p++; }
            if(v < qV){ cores.push("🔴"); v++; }
        }
    }

    return cores.slice(0,10);
}

// ⏱️ lista
function gerarLista(preto, vermelho){
    let cores = gerarCores(preto, vermelho);

    let agora = new Date();
    let h = agora.getHours();
    let m = agora.getMinutes();

    let lista = "";

    for(let i=0;i<cores.length;i++){
        m += 3;
        if(m >= 60){ m -= 60; h++; }

        let mm = m.toString().padStart(2,'0');
        lista += `${h}:${mm} → ${cores[i]}+⚪️\n`;
    }

    return lista;
}

// 🔊 som
function tocarSom(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}

// 📳 vibração
function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate(300);
    }
}

// 📸 upload
document.getElementById("upload").addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file) return;

    let barra = document.getElementById("barra");
    barra.style.width = "0%";
    barra.innerText = "0%";

    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);

    let image = new Image();

    image.onload = function(){

        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");

        let scale = window.devicePixelRatio || 2;

        canvas.width = image.width * scale;
        canvas.height = image.height * scale;

        canvas.style.width = image.width + "px";
        canvas.style.height = image.height + "px";

        ctx.scale(scale, scale);
        ctx.drawImage(image, 0, 0);

        let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        let data = imgData.data;

        for(let i=0; i<data.length; i+=4){
            let media = (data[i] + data[i+1] + data[i+2]) / 3;
            let cor = media > 140 ? 255 : 0;

            data[i] = cor;
            data[i+1] = cor;
            data[i+2] = cor;
        }

        ctx.putImageData(imgData,0,0);

        document.getElementById("status").innerText = "🧠 Analisando padrão...";

        Tesseract.recognize(canvas, 'eng', {
            logger: m => {
                if (m.status === "recognizing text") {
                    let progresso = Math.round(m.progress * 100);
                    barra.style.width = progresso + "%";
                    barra.innerText = progresso + "%";
                }
            }
        }).then(({ data: { text } }) => {

            document.getElementById("texto").innerText = "Texto:\n" + text;

            let porcentagens = text.match(/\d+(\.\d+)?(?=\s*%)/g);

            if (!porcentagens || porcentagens.length < 2) {
                document.getElementById("status").innerText = "❌ Não achou %";
                return;
            }

            let preto = normalizar(parseFloat(porcentagens[0]));
            let vermelho = normalizar(parseFloat(porcentagens[1]));
            let branco = porcentagens[2] ? normalizar(parseFloat(porcentagens[2])) : 0;

            document.getElementById("porcentagem").innerText =
                `⚫ ${preto}% | 🔴 ${vermelho}% | ⚪ ${branco}%`;

            let lista = gerarLista(preto, vermelho);

            document.getElementById("status").innerText = "✅ Sinais prontos";
            document.getElementById("lista").innerText = lista;

            tocarSom();
            vibrar();

        });

    }

    image.src = URL.createObjectURL(file);

});

// 📋 copiar
document.getElementById("copiarBtn").addEventListener("click", function(){

    let lista = document.getElementById("lista").innerText;

    let recomendacoes = `

📋 RECOMENDAÇÕES

• Entrar até G1
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)
• NÃO entrar após sair branco ⚪
`;

    let textoFinal = lista + "\n" + recomendacoes;

    navigator.clipboard.writeText(textoFinal).then(() => {

        let botao = document.getElementById("copiarBtn");
        botao.innerText = "✅ Copiado!";
        
        setTimeout(() => {
            botao.innerText = "📋 Copiar Sinais";
        }, 2000);

    });

});

</script>

</body>
</html>
