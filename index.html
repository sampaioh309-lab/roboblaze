<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family: Arial;
    background:#ffffff;
    color:#000;
    margin:0;
    padding:10px;
    overflow-y:auto;
}

#app{
    width:95%;
    max-width:420px;
    margin:0 auto;
    background:#fff;
    border-radius:20px;
    padding:16px;
    border:1px solid #ccc;
}

h2{text-align:center;color:#000;margin-bottom:10px}

.botao{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:12px;
    background:#000;
    color:#fff;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

img,canvas{
    width:100%;
    margin-top:10px;
    border-radius:12px
}

#barra{
    height:16px;
    border:1px solid #ccc;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px
}

#progresso{
    height:100%;
    width:0%;
    background:#000
}

#status,#porcentagem,#contador{
    text-align:center;
    margin-top:8px
}

#lista{
    white-space:pre-line;
    margin-top:10px;
    border:1px solid #ccc;
    padding:10px;
    border-radius:12px
}
</style>

</head>

<body>

<div id="app">

<h2>📸 Robô Double PRO</h2>

<label for="fileInput" class="botao">🖼️ Escolher imagem</label>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<img id="preview">
<canvas id="canvas"></canvas>

<div id="barra"><div id="progresso"></div></div>

<p id="status">Aguardando imagem...</p>
<p id="porcentagem"></p>
<div id="lista"></div>

</div>

<script>

let processando = false;

// 🔄 ANIMAÇÃO
function animarCarregamento(callback){
    let p = document.getElementById("progresso");
    let v = 0;

    let i = setInterval(()=>{
        v+=5;
        p.style.width = v+"%";
        if(v>=100){
            clearInterval(i);
            setTimeout(callback,300);
        }
    },60);
}

// 📋 GERAR LISTA MELHORADA
function gerarLista(p,v){
    let d=new Date();
    let h=d.getHours();
    let m=d.getMinutes();
    let lista="";

    for(let i=0;i<10;i++){
        m+=1;
        if(m>=60){m-=60;h++;}

        let cor;

        if(v > p){
            cor = "🔴";
        }else if(p > v){
            cor = "⚫";
        }else{
            cor = Math.random() < 0.5 ? "🔴" : "⚫";
        }

        lista += `${h}:${m.toString().padStart(2,'0')} → ${cor} + ⚪️\n`;
    }

    document.getElementById("lista").innerText = lista;
}

// 🧠 PROCESSAR IMAGEM
function processarImagem(file){

    if(processando) return;
    processando = true;

    const reader = new FileReader();

    reader.onload = function(e){

        const preview = document.getElementById("preview");
        const canvas = document.getElementById("canvas");
        const status = document.getElementById("status");
        const porcentagem = document.getElementById("porcentagem");

        preview.src = e.target.result;

        let image = new Image();

        image.onload = function(){

            let ctx = canvas.getContext("2d");

            // ✂️ CORTA PARTE DE CIMA
            canvas.width = image.width;
            canvas.height = image.height * 0.35;

            ctx.drawImage(
                image,
                0,0,image.width,image.height*0.35,
                0,0,canvas.width,canvas.height
            );

            // 🔥 MELHORAR CONTRASTE
            let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            let data = imgData.data;

            for(let i=0;i<data.length;i+=4){

                let media = (data[i]+data[i+1]+data[i+2])/3;

                let cor = media > 180 ? 255 : 0;

                data[i]=cor;
                data[i+1]=cor;
                data[i+2]=cor;
            }

            ctx.putImageData(imgData,0,0);

            status.innerText="🔄 Lendo porcentagem...";

            animarCarregamento(()=>{

                Tesseract.recognize(canvas,'eng').then(({data:{text}})=>{

                    console.log("OCR:", text);

                    let nums = text.match(/\d+(\.\d+)?(?=\s*%)/g) || [];

                    nums = nums.map(n => parseFloat(n));

                    let p = nums[0];
                    let v = nums[1];

                    if(!p || !v){
                        status.innerText = "❌ Não detectou porcentagem";
                        processando = false;
                        return;
                    }

                    if(p > 100 || v > 100){
                        status.innerText = "❌ Valor inválido";
                        processando = false;
                        return;
                    }

                    porcentagem.innerText = `⚫ ${p}% | 🔴 ${v}%`;

                    gerarLista(p,v);

                    status.innerText="✅ Lista gerada";
                    processando = false;
                });

            });

        };

        image.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

// 📂 EVENTO
document.getElementById("fileInput").onchange = e=>{
    if(e.target.files[0]) processarImagem(e.target.files[0]);
};

</script>

</body>
</html>
