<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title>

<meta name="theme-color" content="#020617">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:95%;
    max-width:420px;
    background:#020617;
    border-radius:20px;
    padding:16px;
    border:1px solid #1e293b;
}

h2{text-align:center;color:#38bdf8;margin-bottom:10px}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00f5ff,#00ff95);
    color:#000;
    font-weight:bold;
}

#blaze{background:#facc15;}

.dica{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#020617;
    border:1px solid #334155;
    text-align:center;
    font-size:14px;
}
</style>

</head>

<body>

<div id="app">

<h2>📸 Robô Double PRO</h2>

<button onclick="abrirBlaze()">🎰 Abrir Blaze (Modo Trader)</button>

<div class="dica" id="modo"></div>

</div>

<script>

// 🔍 DETECTA PWA
function estaEmPWA(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
}

// AVISO AUTOMÁTICO
window.onload = function(){

    if(estaEmPWA()){
        document.getElementById("modo").innerHTML =
        "⚠️ Você está no modo APP<br>Abra pelo Chrome para melhor funcionamento";
    } else {
        document.getElementById("modo").innerHTML =
        "✅ Modo correto (Chrome)";
    }

}

// 🚀 ABRIR BLAZE INTELIGENTE
function abrirBlaze(){

    const url = "https://blaze.com/pt/games/double";

    // se estiver em PWA, avisa forte
    if(estaEmPWA()){
        alert(
`🚨 MODO ERRADO

Você abriu como APP.

👉 Abra pelo Google Chrome:
https://sampaioh309-lab.github.io/roboblaze/

Depois tente novamente.`
        );
        return;
    }

    // tentativa 1
    let win = window.open(url, "_blank");

    // tentativa 2 (fallback)
    setTimeout(()=>{
        if(!win || win.closed){
            window.location.href = url;
        }
    }, 800);

    // tentativa 3 (forçar chrome android)
    setTimeout(()=>{
        window.location.href = "intent://blaze.com/pt/games/double#Intent;scheme=https;package=com.android.chrome;end";
    }, 1500);

    // guia
    setTimeout(()=>{
        alert(
`📱 MODO TRADER

Agora faça tela dividida:

1️⃣ Botão de apps recentes
2️⃣ Segure no Chrome
3️⃣ Tela dividida
4️⃣ Escolha o robô

🔥 Use os dois juntos`
        );
    }, 2500);

}

</script>

</body>
</html>
