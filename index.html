<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#app{
    width:95%;
    max-width:420px;
    background:#020617;
    border-radius:20px;
    padding:16px;
    border:1px solid #1e293b;
}

h2{text-align:center;color:#38bdf8;margin-bottom:10px}

button,.botao{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00f5ff,#00ff95);
    color:#000;
    font-weight:bold;
    text-align:center;
}

#blaze{background:#facc15;}

img,canvas{width:100%;margin-top:10px;border-radius:12px}

#barra{
    height:16px;
    background:#020617;
    border:1px solid #334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

#progresso{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00f5ff,#00ff95);
}

#status{text-align:center;margin-top:8px}
#porcentagem{text-align:center;margin-top:5px}
#contador{text-align:center;margin-top:10px;color:#facc15}
#lista{white-space:pre-line;margin-top:10px;border:1px solid #334155;padding:10px;border-radius:12px}
</style>

</head>

<body>

<div id="app">

<h2>📸 Robô Double PRO</h2>

<!-- CÂMERA -->
<label for="cameraInput" class="botao">📸 Tirar Foto</label>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<!-- GALERIA -->
<label for="fileInput" class="botao">🖼️ Galeria</label>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<img id="preview">
<canvas id="canvas"></canvas>

<div id="barra"><div id="progresso"></div></div>

<p id="status">Aguardando imagem...</p>
<p id="porcentagem"></p>
<p id="contador"></p>

<div id="lista"></div>

<button onclick="copiarTudo()">📋 Copiar Lista</button>
<button onclick="ativarSinais()">🚀 Ativar Sinais</button>
<button id="blaze" onclick="abrirBlaze()">🌐 Abrir Blaze</button>

</div>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyABwBwgQ3OREckh9LC8DRmN8KwOKKy6l_A",
  authDomain: "roboblaze-8dfde.firebaseapp.com",
  projectId: "roboblaze-8dfde",
  messagingSenderId: "88914971613",
  appId: "1:88914971613:web:a04143458a9ea4fdac0434"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

// PERMISSÃO
Notification.requestPermission().then((permission) => {
  if (permission === "granted") {
    getToken(messaging, {
      vapidKey: "BMQ-zkZ9SLHAlRY0Mmy6F4Srf468OZl0VVL0qn9B-Bc11bQz-hy-gX7LNB9XoHHD5XIciMVwyYoRcyBm9ZoXb3E"
    }).then((token) => {
      console.log("TOKEN:", token);
    });
  }
});

// RECEBER COM APP ABERTO
onMessage(messaging, (payload) => {
  alert(payload.notification.title + "\n" + payload.notification.body);
});

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ================= ROBÔ =================

let listaGlobal = "";

// ABRIR BLAZE
function abrirBlaze(){
    window.location.href="https://blaze.com";
}

// CARREGAMENTO
function animarCarregamento(callback){
    let progresso = document.getElementById("progresso");
    progresso.style.width = "0%";
    let valor = 0;

    let intervalo = setInterval(()=>{
        valor += 5;
        progresso.style.width = valor + "%";

        if(valor >= 100){
            clearInterval(intervalo);
            setTimeout(callback, 300);
        }
    },80);
}

// GERAR LISTA
function gerarLista(p,v){
    let d=new Date();
    let h=d.getHours(),m=d.getMinutes();
    let lista="";

    for(let i=0;i<10;i++){
        m+=3;if(m>=60){m-=60;h++;}
        let cor=Math.random()<0.5?"🔴":"⚫";
        lista+=`${h}:${m.toString().padStart(2,'0')} → ${cor}+⚪️\n`;
    }

    listaGlobal=lista;
    document.getElementById("lista").innerText=lista;
}

// ATIVAR
function ativarSinais(){
    if(!listaGlobal){
        alert("Gere a lista primeiro!");
        return;
    }
    alert("🔥 Agora envie pelo Firebase");
}

// COPIAR
function copiarTudo(){
    navigator.clipboard.writeText(listaGlobal);
    alert("Copiado!");
}

// OCR
function processarImagem(file){

    const reader=new FileReader();

    reader.onload=function(e){

        preview.src=e.target.result;

        let image=new Image();

        image.onload=function(){

            let ctx=canvas.getContext("2d");

            canvas.width=image.width;
            canvas.height=image.height;

            ctx.drawImage(image,0,0);

            status.innerText="🔄 Processando...";

            animarCarregamento(()=>{

                Tesseract.recognize(canvas,'eng').then(({data:{text}})=>{

                    let nums=text.match(/\d+(\.\d+)?(?=\s*%)/g);

                    if(!nums||nums.length<2){
                        status.innerText="❌ Não achou %";
                        return;
                    }

                    let p=parseFloat(nums[0]);
                    let v=parseFloat(nums[1]);

                    porcentagem.innerText=`⚫ ${p}% | 🔴 ${v}%`;

                    gerarLista(p,v);

                    status.innerText="✅ Lista gerada";
                });

            });

        };

        image.src=e.target.result;
    };

    reader.readAsDataURL(file);
}

// EVENTOS
document.getElementById("cameraInput").onchange = e=>{
    if(e.target.files[0]) processarImagem(e.target.files[0]);
};

document.getElementById("fileInput").onchange = e=>{
    if(e.target.files[0]) processarImagem(e.target.files[0]);
};

</script>

</body>
</html>
