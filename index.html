<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Robô Double PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: #fff;
}

canvas, img {
    max-width: 95%;
    margin-top: 10px;
    border-radius: 10px;
}

#barra {
    width: 90%;
    height: 20px;
    background: #333;
    margin: 15px auto;
    border-radius: 10px;
    overflow: hidden;
}

#progresso {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#00ff88,#00c3ff);
    transition: width 0.3s;
}
</style>
</head>

<body>

<h2>📸 Robô Double (OCR FORTE)</h2>

<input type="file" id="upload">

<br>
<img id="preview">
<canvas id="canvas"></canvas>

<div id="barra"><div id="progresso"></div></div>

<p id="status">Aguardando imagem...</p>
<p id="texto"></p>
<p id="porcentagem"></p>
<div id="lista"></div>

<br>

<button onclick="copiarTudo()">📋 Copiar Lista + Recomendações</button>

<p id="recomendacoes">
📋 RECOMENDAÇÕES<br><br>
• Entrar até G1<br>
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)<br>
• NÃO entrar após sair branco ⚪
</p>

<br><br>

<p style="opacity:0.6;font-size:12px;">
Henrique Sampaio<br>
Desenvolvedor
</p>

<script>

/* NORMALIZAR */
function normalizar(v){
    if(v > 100) v = v / 10;
    return v;
}

/* 🔥 NOVA LÓGICA PROFISSIONAL */
function gerarCores(preto, vermelho){

    let total = preto + vermelho;

    let proporcaoV = vermelho / total;
    let proporcaoP = preto / total;

    let cores = [];

    let acumuladoV = 0;
    let acumuladoP = 0;

    for(let i=0; i<10; i++){

        acumuladoV += proporcaoV;
        acumuladoP += proporcaoP;

        if(acumuladoV > acumuladoP){
            cores.push("🔴");
            acumuladoV -= 1;
        } else {
            cores.push("⚫");
            acumuladoP -= 1;
        }

    }

    return cores;
}

/* LISTA */
function gerarLista(preto, vermelho){

    let cores = gerarCores(preto, vermelho);

    let agora = new Date();
    let h = agora.getHours();
    let m = agora.getMinutes();

    let lista = "";

    for(let i=0;i<cores.length;i++){

        m += 3;
        if(m >= 60){ m -= 60; h++; }

        let mm = m.toString().padStart(2,'0');

        lista += `${h}:${mm} → ${cores[i]}+⚪️\n`;
    }

    return lista;
}

/* PROGRESSO */
function carregarBarra(callback){

    let progresso = document.getElementById("progresso");
    let valor = 0;

    let intervalo = setInterval(()=>{

        valor += 5;
        progresso.style.width = valor + "%";

        if(valor >= 100){
            clearInterval(intervalo);
            callback();
        }

    }, 80);
}

/* COPIAR */
function copiarTudo(){

    let lista = document.getElementById("lista").innerText;
    let rec = document.getElementById("recomendacoes").innerText;

    let texto = lista + "\n\n" + rec;

    navigator.clipboard.writeText(texto);

    alert("Copiado!");
}

/* OCR */
document.getElementById("upload").addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file) return;

    let img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);

    let image = new Image();

    image.onload = function(){

        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");

        canvas.width = image.width * 2;
        canvas.height = image.height * 2;

        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

        let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        let data = imgData.data;

        for(let i=0; i<data.length; i+=4){
            let media = (data[i] + data[i+1] + data[i+2]) / 3;
            let cor = media > 140 ? 255 : 0;
            data[i]=data[i+1]=data[i+2]=cor;
        }

        ctx.putImageData(imgData,0,0);

        document.getElementById("status").innerText = "🔍 Lendo imagem...";

        carregarBarra(()=>{

            Tesseract.recognize(canvas, 'eng').then(({ data: { text } }) => {

                document.getElementById("texto").innerText = "Texto:\n" + text;

                let porcentagens = text.match(/\d+(\.\d+)?(?=\s*%)/g);

                if (!porcentagens || porcentagens.length < 2) {
                    document.getElementById("status").innerText = "❌ Não achou %";
                    return;
                }

                let preto = normalizar(parseFloat(porcentagens[0]));
                let vermelho = normalizar(parseFloat(porcentagens[1]));
                let branco = porcentagens[2] ? normalizar(parseFloat(porcentagens[2])) : 0;

                document.getElementById("porcentagem").innerText =
                    `⚫ ${preto}% | 🔴 ${vermelho}% | ⚪ ${branco}%`;

                let lista = gerarLista(preto, vermelho);

                document.getElementById("status").innerText = "✅ Lista pronta";
                document.getElementById("lista").innerText = lista;

            });

        });

    }

    image.src = URL.createObjectURL(file);

});
</script>

</body>
</html>
