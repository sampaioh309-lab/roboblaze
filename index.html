<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robô Double PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family: Arial;
    background:#ffffff;
    color:#000;
    padding:10px;
}

#app{
    width:95%;
    max-width:420px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:16px;
    border:1px solid #ccc;
}

h2{text-align:center;margin-bottom:10px}

.botao{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:14px;
    background:linear-gradient(45deg,#06b6d4,#22c55e);
    color:#000;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

img,canvas{
    width:100%;
    margin-top:10px;
    border-radius:12px;
}

#status,#porcentagem{
    text-align:center;
    margin-top:8px;
}

#lista{
    white-space:pre-line;
    margin-top:10px;
    border:1px solid #ccc;
    padding:10px;
    border-radius:12px;
}
</style>

</head>

<body>

<div id="app">

<h2>📸 Robô Double PRO</h2>

<label for="fileInput" class="botao">🖼️ Escolher imagem</label>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<img id="preview">
<canvas id="canvas"></canvas>

<p id="status">Aguardando imagem...</p>
<p id="porcentagem"></p>

<div id="lista"></div>

<div class="botao" onclick="copiarLista()">📋 Copiar Lista</div>
<div class="botao" onclick="ativarSinais()">🚀 Ativar Sinais</div>
<div class="botao" onclick="abrirBlaze()" style="background:#facc15">🌐 Abrir Blaze</div>

</div>

<script>

// 📊 GERAR LISTA
function gerarLista(p,v){
    let d=new Date();
    let h=d.getHours();
    let m=d.getMinutes();
    let lista="";

    for(let i=0;i<10;i++){
        m+=1;
        if(m>=60){m-=60;h++;}

        let cor;

        if(v > p){
            cor = "🔴";
        }else if(p > v){
            cor = "⚫";
        }else{
            cor = Math.random() < 0.5 ? "🔴" : "⚫";
        }

        lista += `${h}:${m.toString().padStart(2,'0')} → ${cor} + ⚪️\n`;
    }

    document.getElementById("lista").innerText = lista;
}

// 🧠 DETECTAR CORES (SUBSTITUI OCR)
function processarImagem(file){

    const reader = new FileReader();

    reader.onload = function(e){

        const preview = document.getElementById("preview");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const status = document.getElementById("status");
        const porcentagem = document.getElementById("porcentagem");

        preview.src = e.target.result;

        let img = new Image();

        img.onload = function(){

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img,0,0);

            let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            let data = imgData.data;

            let vermelho = 0;
            let preto = 0;

            for(let i=0;i<data.length;i+=4){

                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];

                if(r > 150 && g < 80 && b < 80){
                    vermelho++;
                }

                if(r < 50 && g < 50 && b < 50){
                    preto++;
                }
            }

            let total = vermelho + preto;

            if(total === 0){
                status.innerText = "❌ Não detectou cores";
                return;
            }

            let p = Math.floor((preto/total)*100);
            let v = Math.floor((vermelho/total)*100);

            porcentagem.innerText = `⚫ ${p}% | 🔴 ${v}%`;

            gerarLista(p,v);

            status.innerText = "✅ Detectado com sucesso";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

// 📂 EVENTO
document.getElementById("fileInput").onchange = e=>{
    if(e.target.files[0]) processarImagem(e.target.files[0]);
};

// 📋 COPIAR
function copiarLista(){
    let texto = document.getElementById("lista").innerText;

    if(!texto){
        alert("⚠️ Nenhuma lista gerada");
        return;
    }

    navigator.clipboard.writeText(texto).then(()=>{
        alert("✅ Lista copiada!");
    });
}

// 🚀 ATIVAR SINAIS
function ativarSinais(){

    let status = document.getElementById("status");

    status.innerText = "🚀 Gerando sinais...";

    let p = Math.floor(Math.random()*100);
    let v = Math.floor(Math.random()*100);

    if(p < 10) p = 50;
    if(v < 10) v = 50;

    document.getElementById("porcentagem").innerText = `⚫ ${p}% | 🔴 ${v}%`;

    gerarLista(p,v);

    status.innerText = "✅ Sinais ativados";
}

// 🌐 ABRIR BLAZE
function abrirBlaze(){
    window.open("https://blaze.com", "_blank");
}

</script>

</body>
</html>
