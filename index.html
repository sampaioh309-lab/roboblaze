<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SHARKBOT AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(270deg,#050505,#0a0a0a,#050505);
background-size:400% 400%;
animation:fundo 10s infinite alternate;
color:white;
font-family:Arial, sans-serif;
text-align:center;
padding:30px;
}

@keyframes fundo{
0%{background-position:0%}
100%{background-position:100%}
}

.container{
max-width:1200px;
width:100%;
margin:auto;
background:#0f0f0f;
padding:40px;
border-radius:20px;
box-shadow:0 0 35px #00ffff33;
border:2px solid #00ffff44;
position:relative;
z-index:1;
}

h1{
font-size:48px;
margin-bottom:15px;
color:#00ffff;
text-shadow:0 0 8px #00ffff,0 0 30px #00ffff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 8px #00ffff}
to{ text-shadow:0 0 30px #00ffff,0 0 60px #00ffff}
}

#assinatura{
font-size:18px;
color:#00ffffcc;
margin-bottom:25px;
}

button{
padding:18px 40px;
font-size:20px;
background:linear-gradient(45deg,#00ffff,#00b3b3);
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
color:#000;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 12px #00ffff66;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffffaa;
}

#preview-container{
position:relative;
display:inline-block;
margin-top:25px;
}

#preview{
max-width:900px;
width:100%;
border-radius:15px;
box-shadow:0 0 25px #00ffff66;
border:2px solid #00ffff44;
transition:0.4s;
}

#scanner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
overflow:hidden;
border-radius:15px;
}

#scanbar{
position:absolute;
width:100%;
height:8px;
background:#00ffff;
box-shadow:0 0 25px #00ffff;
animation:scan 4s linear infinite;
}

@keyframes scan{
0%{top:0%}
50%{top:100%}
100%{top:0%}
}

#status{
margin-top:20px;
color:#00ffff;
font-size:18px;
display:none;
}

#resultado{
margin-top:25px;
display:inline-block;
text-align:left;
font-size:26px;
line-height:36px;
padding:25px 30px;
background:#070707;
border-radius:15px;
box-shadow:0 0 20px #000, inset 0 0 15px #00ffff33;
border:2px solid #00ffff33;
min-width:600px;
word-break:break-word;
}

#recomendacao{
margin-top:15px;
font-size:20px;
line-height:28px;
text-align:left;
white-space:pre-wrap;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>SHARKBOT AI</h1>
<div id="assinatura">Developed by Henrique Sampaio</div>

<input type="file" id="upload">

<div id="preview-container">
<img id="preview">
<div id="scanner">
<div id="scanbar"></div>
</div>
</div>

<br>

<button id="botao" onclick="analisar()">ANALISAR HISTÓRICO</button>

<div id="status">Escaneando histórico...</div>

<div id="resultado"></div>
<div id="recomendacao">
Recomendação:
.Apostar até G1
.Não entrar contra a tendência 
(🟥🟥🟥🟥) ou (⬛️⬛️⬛️⬛️)
</div>

</div>

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById("matrix")
const ctx = canvas.getContext("2d")
canvas.height = window.innerHeight
canvas.width = window.innerWidth
const letters = "01SHARKBOTAI"
const array = letters.split("")
const fontSize = 18
const columns = canvas.width / fontSize
const drops = []
for(let x = 0; x < columns; x++) drops[x] = 1
function drawMatrix(){
ctx.fillStyle = "rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.fillStyle = "#00ffff"
ctx.font = fontSize + "px monospace"
for(let i = 0; i < drops.length; i++){
const text = array[Math.floor(Math.random()*array.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)
if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0
drops[i]++
}}
setInterval(drawMatrix,35)

// ROBÔ
let imagemCarregada = null
let listaTexto = ""

document.getElementById("upload").addEventListener("change", function(e){
let file = e.target.files[0]
let reader = new FileReader()
reader.onload = function(event){
document.getElementById("preview").src = event.target.result
let img = new Image()
img.src = event.target.result
img.onload = function(){imagemCarregada = img}
}
reader.readAsDataURL(file)
})

function analisar(){
if(!imagemCarregada){alert("Envie uma imagem primeiro"); return}
document.getElementById("scanner").style.display="block"
document.getElementById("status").style.display="block"
document.getElementById("resultado").innerHTML=""
document.getElementById("preview").style.filter="brightness(0.4)"
setTimeout(processarImagem,4000)
}

function processarImagem(){
let canvas = document.createElement("canvas")
let ctx = canvas.getContext("2d")
canvas.width = imagemCarregada.width
canvas.height = imagemCarregada.height
ctx.drawImage(imagemCarregada,0,0)
let data = ctx.getImageData(0,0,canvas.width,canvas.height).data
let preto = 0
let vermelho = 0
for(let i=0;i<data.length;i+=4){
let r = data[i], g = data[i+1], b = data[i+2]
if(r>180 && g<80 && b<80){vermelho++}
else if(r<80 && g<80 && b<80){preto++}
}
let tendencia="⚫"
if(vermelho>preto) tendencia="🔴"
gerarSinais(tendencia)
}

function gerarSinais(tendencia){
let agora = new Date()
let horaAtual = agora.getHours()
let minutoAtual = agora.getMinutes()
let lista = []
let ultimoMinuto = minutoAtual
for(let i=0;i<10;i++){
let incremento = Math.floor(Math.random()*6)+1
ultimoMinuto += incremento
let hora = horaAtual
if(ultimoMinuto>=60){hora += Math.floor(ultimoMinuto/60); ultimoMinuto = ultimoMinuto%60}
hora = hora.toString().padStart(2,'0')
let minuto = ultimoMinuto.toString().padStart(2,'0')
let cor = Math.random()>0.5 ? "🔴" : "⚫"
let branco="+⚪️"
lista.push({hora,minuto,cor,branco})
}
mostrar(lista)
}

function mostrar(lista){
document.getElementById("scanner").style.display="none"
document.getElementById("status").style.display="none"
document.getElementById("preview").style.filter="brightness(1)"
let div = document.getElementById("resultado")
div.innerHTML=""
listaTexto=""
lista.forEach(item=>{
let linha = `${item.hora}:${item.minuto} ${item.cor}${item.branco}`
div.innerHTML += linha + "<br>"
listaTexto += linha + "\n"
})
listaTexto += "\nRecomendação:\n.Apostar até G1\n.Não entrar contra a tendência\n(🟥🟥🟥🟥) ou (⬛️⬛️⬛️⬛️)"
let botao = document.getElementById("botao")
botao.innerText = "COPIAR LISTA"
botao.onclick = copiarLista
}

function copiarLista(){
navigator.clipboard.writeText(listaTexto)
let botao = document.getElementById("botao")
botao.innerText = "LISTA COPIADA ✓"
setTimeout(()=>{botao.innerText = "COPIAR LISTA"},2000)
}
</script>

</body>
</html>
