<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SHARKBOT AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
overflow-x:hidden;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
background:#0f0f0f;
padding:40px;
border-radius:20px;
box-shadow:0 0 35px #00ffff33;
border:2px solid #00ffff44;
}

h1{
font-size:48px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
margin-bottom:10px;
}

#assinatura{
color:#00ffff;
margin-bottom:20px;
}

button{
padding:16px 30px;
font-size:18px;
background:linear-gradient(45deg,#00ffff,#00b3b3);
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
font-weight:bold;
}

#previewBox{
position:relative;
display:inline-block;
}

#preview{
max-width:600px;
width:100%;
border-radius:15px;
margin-top:20px;
display:none;
border:2px solid #00ffff55;
}

#scanLine{
position:absolute;
left:0;
width:100%;
height:3px;
background:#00ff9d;
box-shadow:0 0 15px #00ff9d;
display:none;
}

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
border-radius:15px;
display:none;
}

#status{
margin-top:20px;
color:#00ffff;
display:none;
font-size:18px;
}

#barra-container{
width:100%;
height:10px;
background:#111;
border-radius:10px;
margin-top:10px;
display:none;
}

#barra{
width:0%;
height:100%;
background:#00ffff;
}

#resultado{
margin-top:25px;
text-align:left;
font-size:22px;
padding:20px;
background:#070707;
border-radius:15px;
border:2px solid #00ffff33;
min-height:120px;
line-height:34px;
}

#copiar{
display:none;
}

#recomendacoes{
margin-top:20px;
background:#050505;
padding:20px;
border-radius:12px;
border:1px solid #00ffff33;
color:#00ffff;
text-align:left;
display:none;
line-height:28px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>SHARKBOT AI</h1>

<div id="assinatura">
Developed by Henrique Sampaio
</div>

<input type="file" id="upload" accept="image/*" style="display:none">

<button onclick="document.getElementById('upload').click()">
CARREGAR PRINT
</button>

<br>

<div id="previewBox">
<img id="preview">
<div id="overlay"></div>
<div id="scanLine"></div>
</div>

<br>

<button onclick="analisar()">
ANALISAR HISTÓRICO
</button>

<div id="status">
Escaneando histórico...
</div>

<div id="barra-container">
<div id="barra"></div>
</div>

<div id="resultado"></div>

<button id="copiar" onclick="copiarLista()">
COPIAR LISTA
</button>

<div id="recomendacoes">

<b>RECOMENDAÇÕES</b><br><br>

• Entrar até G1<br>
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)<br>
• NÃO entrar após sair branco ⚪

</div>

</div>

<script>

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01SHARKBOTAI"
const array=letters.split("")
const fontSize=18
const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++){
drops[x]=1
}

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ffff"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=array[Math.floor(Math.random()*array.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(drawMatrix,35)

let imagemCarregada=null

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(event){

let preview=document.getElementById("preview")
preview.src=event.target.result
preview.style.display="block"

let img=new Image()
img.src=event.target.result

img.onload=function(){
imagemCarregada=img
}

}

reader.readAsDataURL(file)

})

function analisar(){

if(!imagemCarregada){
alert("Carregue um print primeiro")
return
}

document.getElementById("status").style.display="block"
document.getElementById("barra-container").style.display="block"
document.getElementById("overlay").style.display="block"
document.getElementById("scanLine").style.display="block"

let barra=document.getElementById("barra")
let linha=document.getElementById("scanLine")
let img=document.getElementById("preview")

barra.style.width="0%"

let progresso=0
let pos=0
let altura=img.offsetHeight

let intervalo=setInterval(()=>{

progresso+=5
pos+=altura/20

barra.style.width=progresso+"%"
linha.style.top=pos+"px"

if(progresso>=100){

clearInterval(intervalo)

document.getElementById("overlay").style.display="none"
document.getElementById("scanLine").style.display="none"

gerarLista()

}

},120)

}

function gerarLista(){

let data=new Date()

let listaHTML=""
let listaTexto=""

for(let i=0;i<10;i++){

data.setMinutes(data.getMinutes()+3)

let hora=data.getHours().toString().padStart(2,"0")
let minuto=data.getMinutes().toString().padStart(2,"0")

let cor=Math.random()>0.5?"🔴":"⚫"

listaHTML+=hora+":"+minuto+" "+cor+" +⚪<br>"
listaTexto+=hora+":"+minuto+" "+cor+" +⚪\n"

}

document.getElementById("resultado").innerHTML=listaHTML
window.listaCopiar=listaTexto

document.getElementById("copiar").style.display="inline-block"
document.getElementById("status").style.display="none"
document.getElementById("recomendacoes").style.display="block"

}

function copiarLista(){

let recomendacoes=`

RECOMENDAÇÕES

• Entrar até G1
• Evitar sequência de 4 iguais (🔴🔴🔴🔴 ou ⚫⚫⚫⚫)
• NÃO entrar após sair branco ⚪
`

let textoFinal=window.listaCopiar+"\n"+recomendacoes

navigator.clipboard.writeText(textoFinal)

alert("Lista e recomendações copiadas!")

}

</script>

</body>
    </html>
